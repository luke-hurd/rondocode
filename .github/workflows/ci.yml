name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        # version comes from package.json "packageManager" (pnpm@9.0.0)

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: |
          pnpm --filter @rondocode/pattern exec tsc --noEmit
          pnpm --filter @rondocode/engine exec tsc --noEmit
          pnpm --filter @rondocode/app exec tsc --noEmit
          pnpm --filter @rondocode/server exec tsc --noEmit

      - name: Lint
        run: node ./node_modules/@biomejs/biome/bin/biome lint packages

      - name: Test
        run: pnpm test

      - name: Build app
        run: pnpm --filter @rondocode/app build
